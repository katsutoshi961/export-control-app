<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>輸出貿易管理令 項番調査</title>
  <meta name="description" content="品名・用途を入力して輸出貿易管理令の該当項番をAIが調査します" />
  <meta name="theme-color" content="#0a2540" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="輸出管理令" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="icon" type="image/png" href="./icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1b2a;
      --bg2: #1b2a3b;
      --surface: #ffffff;
      --accent: #1e90ff;
      --accent-dark: #1e3a8a;
      --text: #1a1a2e;
      --muted: #7f8c8d;
      --danger: #c0392b;
      --warn: #d35400;
      --ok: #27ae60;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 50%, var(--bg) 100%);
      min-height: 100dvh;
      color: var(--text);
    }

    /* ── Header ── */
    #header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(90deg, #0a2540 0%, #1a3a5c 100%);
      border-bottom: 2px solid rgba(30,144,255,.25);
      box-shadow: 0 2px 20px rgba(0,0,0,.45);
      padding: calc(12px + var(--safe-top)) 16px 12px;
    }
    #header .inner { max-width: 720px; margin: 0 auto; display: flex; align-items: center; gap: 12px; }
    #header .emoji { font-size: 26px; }
    #header .sub  { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2px; }
    #header .title{ font-size: 16px; font-weight: 900; color: #fff; letter-spacing: .4px; }

    /* ── Main ── */
    #main { max-width: 720px; margin: 0 auto; padding: 20px 14px calc(40px + var(--safe-bot)); }

    /* ── Card ── */
    .card {
      background: rgba(255,255,255,.97);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,.28);
      margin-bottom: 16px;
    }

    /* ── Form ── */
    label.field-label {
      display: block;
      font-weight: 700;
      font-size: 12px;
      color: var(--text);
      margin-bottom: 6px;
      margin-top: 14px;
    }
    label.field-label:first-child { margin-top: 0; }
    .req { color: var(--danger); }

    input[type=text], textarea {
      width: 100%;
      padding: 11px 13px;
      border: 1.5px solid #dde3ed;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      background: #f8faff;
      outline: none;
      transition: border-color .2s;
      -webkit-appearance: none;
    }
    input[type=text]:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; line-height: 1.6; }

    /* ── Radio tabs ── */
    .radio-group { display: flex; gap: 8px; margin-top: 6px; }
    .radio-group label {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 6px;
      border: 2px solid #dde3ed;
      border-radius: 10px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      color: #666;
      background: #fafafa;
      transition: all .15s;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .radio-group input { display: none; }
    .radio-group input:checked + span + span,
    .radio-group label.selected {
      color: var(--accent);
    }
    .radio-group label.selected {
      border-color: var(--accent);
      background: #e8f4ff;
      color: var(--accent);
    }
    .radio-group label .icon { font-size: 20px; }

    /* ── Button ── */
    #btn-search {
      width: 100%;
      margin-top: 18px;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, var(--accent-dark) 0%, var(--accent) 100%);
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: .8px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(30,144,255,.35);
      transition: opacity .2s;
      -webkit-appearance: none;
    }
    #btn-search:disabled { background: #95a5a6; box-shadow: none; cursor: not-allowed; }

    /* ── Error ── */
    #error-msg {
      display: none;
      background: #fdecea;
      color: var(--danger);
      border: 1px solid #f5c6c2;
      border-radius: 8px;
      padding: 10px 13px;
      font-size: 13px;
      margin-top: 12px;
    }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 3px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results ── */
    #results { display: none; }

    .summary-card {
      background: rgba(255,255,255,.97);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,.2);
      border-left: 5px solid #7f8c8d;
    }
    .summary-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .summary-title { font-weight: 900; font-size: 14px; }
    .risk-badge-main {
      margin-left: auto;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 800;
      border: 1.5px solid;
    }
    .summary-text { font-size: 13px; line-height: 1.8; color: #2c3e50; }

    /* ── Candidate card ── */
    .section-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      color: #ccc;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .candidate {
      border-radius: 10px;
      margin-bottom: 12px;
      background: #fff;
      box-shadow: 0 1px 6px rgba(0,0,0,.08);
      overflow: hidden;
      border: 1.5px solid #eee;
    }
    .candidate-header {
      padding: 13px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .cat-icon { font-size: 20px; flex-shrink: 0; }
    .candidate-meta { flex: 1; min-width: 0; }
    .item-number {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 700;
      font-size: 13px;
      padding: 2px 8px;
      border-radius: 6px;
      display: inline-block;
      margin-bottom: 4px;
    }
    .item-name { font-weight: 700; font-size: 13px; color: var(--text); margin-bottom: 3px; }
    .cat-name  { font-size: 11px; color: var(--muted); }
    .chevron { color: #bbb; font-size: 14px; transition: transform .2s; flex-shrink: 0; }
    .chevron.open { transform: rotate(90deg); }

    .candidate-detail {
      display: none;
      padding: 0 14px 14px;
      border-top: 1px solid #f0f0f0;
    }
    .candidate-detail.open { display: block; }

    .detail-section { margin-top: 10px; }
    .detail-label { font-size: 10px; font-weight: 700; color: #999; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
    .detail-body {
      font-size: 12px;
      color: #2c3e50;
      line-height: 1.75;
      background: #f8f9fa;
      border-radius: 7px;
      padding: 8px 11px;
    }
    .related-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .related-tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      background: #f0f4ff;
      color: #2c3e87;
      padding: 2px 8px;
      border-radius: 6px;
      border: 1px solid #c5cef0;
    }

    /* risk badge small */
    .risk-badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 800;
      border: 1px solid;
      margin-left: 4px;
    }

    /* ── Catch-all ── */
    .catchall-card {
      background: #fff9e6;
      border: 1.5px solid #f39c12;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
    }
    .catchall-title { font-weight: 800; font-size: 12px; color: var(--warn); margin-bottom: 6px; }
    .catchall-body  { font-size: 13px; color: #5d4037; line-height: 1.75; }

    /* ── Next steps ── */
    .nextsteps-title { font-weight: 800; font-size: 13px; color: var(--text); margin-bottom: 10px; }
    .nextsteps-list { padding-left: 18px; }
    .nextsteps-list li { font-size: 13px; color: #2c3e50; line-height: 1.8; margin-bottom: 3px; }

    /* ── Disclaimer ── */
    .disclaimer {
      background: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 10px;
      padding: 11px 13px;
      font-size: 10px;
      color: #6c757d;
      line-height: 1.7;
    }

    /* ── Install banner ── */
    #install-banner {
      display: none;
      position: fixed;
      bottom: calc(16px + var(--safe-bot));
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 400px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,.3);
      padding: 14px 16px;
      z-index: 200;
      border: 1.5px solid var(--accent);
    }
    #install-banner .banner-title { font-weight: 800; font-size: 13px; color: var(--text); margin-bottom: 4px; }
    #install-banner .banner-body  { font-size: 11px; color: var(--muted); margin-bottom: 10px; line-height: 1.6; }
    #install-banner .banner-btns  { display: flex; gap: 8px; }
    #install-banner button {
      flex: 1; padding: 9px; border: none; border-radius: 8px;
      font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer;
    }
    #btn-install { background: var(--accent); color: #fff; }
    #btn-dismiss { background: #f0f0f0; color: #555; }
  </style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div class="inner">
    <span class="emoji">🛃</span>
    <div>
      <div class="sub">Ministry of Economy, Trade and Industry</div>
      <div class="title">輸出貿易管理令 項番調査ツール</div>
    </div>
  </div>
</div>

<!-- Main -->
<div id="main">

  <!-- Input Card -->
  <div class="card">
    <label class="field-label">品名・製品名 <span class="req">*</span></label>
    <input type="text" id="inp-name" placeholder="例：高周波増幅器、炭素繊維、暗号化ソフトウェア" autocomplete="off" />

    <label class="field-label">用途・仕様・スペック（詳しいほど精度向上）</label>
    <textarea id="inp-usage" rows="4" placeholder="例：周波数帯域 1〜18GHz、軍用規格対応、航空機搭載用電子機器との組み合わせ使用を想定"></textarea>

    <label class="field-label">対象区分</label>
    <div class="radio-group" id="radio-group">
      <label id="lbl-goods" class="selected" onclick="selectType('goods')">
        <input type="radio" name="type" value="goods" checked />
        <span class="icon">📦</span>
        <span>貨物<br>（有形品）</span>
      </label>
      <label id="lbl-tech" onclick="selectType('tech')">
        <input type="radio" name="type" value="tech" />
        <span class="icon">💡</span>
        <span>技術・役務<br>（無形）</span>
      </label>
      <label id="lbl-both" onclick="selectType('both')">
        <input type="radio" name="type" value="both" />
        <span class="icon">🔍</span>
        <span>両方・<br>不明</span>
      </label>
    </div>

    <div id="error-msg"></div>

    <button id="btn-search" onclick="doSearch()">🔍 項番を調査する</button>
  </div>

  <!-- Results -->
  <div id="results">

    <!-- Summary -->
    <div class="summary-card" id="summary-card">
      <div class="summary-header">
        <span>📋</span>
        <span class="summary-title">調査サマリー</span>
        <span class="risk-badge-main" id="badge-overall"></span>
      </div>
      <div class="summary-text" id="summary-text"></div>
    </div>

    <!-- Candidates -->
    <div class="section-label" id="cand-label"></div>
    <div id="candidates-list"></div>

    <!-- Catch-all -->
    <div class="catchall-card" id="catchall-card" style="display:none">
      <div class="catchall-title">⚠️ キャッチオール規制（外為令16条）</div>
      <div class="catchall-body" id="catchall-body"></div>
    </div>

    <!-- Next Steps -->
    <div class="card" id="nextsteps-card" style="display:none">
      <div class="nextsteps-title">✅ 推奨される次のアクション</div>
      <ol class="nextsteps-list" id="nextsteps-list"></ol>
    </div>

    <!-- Disclaimer -->
    <div class="disclaimer">
      ※ このツールはAIによる参考情報の提供を目的としており、法的判断の根拠とはなりません。輸出許可申請・非該当証明等の最終判断は必ず専門家または経済産業省にご確認ください。
    </div>
  </div>

</div>

<!-- Install Banner -->
<div id="install-banner">
  <div class="banner-title">📱 ホーム画面に追加</div>
  <div class="banner-body">アプリとしてインストールするとオフラインでも使えます</div>
  <div class="banner-btns">
    <button id="btn-install" onclick="installApp()">追加する</button>
    <button id="btn-dismiss" onclick="dismissBanner()">後で</button>
  </div>
</div>

<script>
// ── Category map ──
const CAT = {
  "1":  { label:"武器",              color:"#c0392b", icon:"⚔️"  },
  "2":  { label:"原子力",            color:"#8e44ad", icon:"☢️"  },
  "3":  { label:"化学・生物兵器",    color:"#16a085", icon:"🧪"  },
  "4":  { label:"ミサイル",          color:"#d35400", icon:"🚀"  },
  "5":  { label:"先端材料",          color:"#2980b9", icon:"🔬"  },
  "6":  { label:"材料加工",          color:"#27ae60", icon:"⚙️"  },
  "7":  { label:"エレクトロニクス",  color:"#f39c12", icon:"💾"  },
  "8":  { label:"コンピュータ",      color:"#1abc9c", icon:"🖥️"  },
  "9":  { label:"通信・情報セキュリティ", color:"#3498db", icon:"📡" },
  "10": { label:"センサー・レーザー", color:"#9b59b6", icon:"🔭"  },
  "11": { label:"航法・航空電子",    color:"#e74c3c", icon:"✈️"  },
  "12": { label:"海洋関連",          color:"#2c3e50", icon:"⚓"  },
  "13": { label:"推進装置",          color:"#e67e22", icon:"🛸"  },
  "15": { label:"その他貨物・技術",  color:"#7f8c8d", icon:"📦"  },
};

const RISK = {
  high:    { label:"要許可の可能性高", bg:"#fdecea", color:"#c0392b", border:"#e74c3c" },
  medium:  { label:"確認推奨",         bg:"#fef9e7", color:"#d35400", border:"#f39c12" },
  low:     { label:"該当可能性低",     bg:"#eafaf1", color:"#1e8449", border:"#27ae60" },
  unknown: { label:"判断困難",         bg:"#f2f3f4", color:"#5d6d7e", border:"#aab7b8" },
};

// ── Type selection ──
let currentType = "goods";
function selectType(t) {
  currentType = t;
  ["goods","tech","both"].forEach(v => {
    document.getElementById("lbl-"+v).classList.toggle("selected", v===t);
  });
}

// ── Search ──
async function doSearch() {
  const name  = document.getElementById("inp-name").value.trim();
  const usage = document.getElementById("inp-usage").value.trim();
  const errEl = document.getElementById("error-msg");

  if (!name) { showError("品名を入力してください"); return; }
  errEl.style.display = "none";

  const btn = document.getElementById("btn-search");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>AIが調査中...';
  document.getElementById("results").style.display = "none";

  const typeLabel = currentType==="goods" ? "貨物（有形品）"
                  : currentType==="tech"  ? "技術・役務（無形）"
                  : "貨物または技術・役務";

  const system = `あなたは日本の輸出貿易管理令（輸出令）および外国為替及び外国貿易法（外為法）の専門家です。
ユーザーが入力した品名・用途から、輸出貿易管理令別表第1の該当項番の候補を分析し、以下のJSON形式のみで回答してください。前置き・後書き・Markdownコードブロックは不要です。

{
  "summary": "全体的な規制リスクの概要（2〜3文）",
  "overallRisk": "high|medium|low|unknown",
  "candidates": [
    {
      "itemNumber": "1-2(1)のような形式",
      "categoryNumber": "1〜15の数字のみ",
      "itemName": "規制品目の名称",
      "riskLevel": "high|medium|low|unknown",
      "reason": "この項番に該当する可能性がある理由",
      "regulation": "主な規制内容・スペック閾値など",
      "licenseNote": "許可申請の要否と注意点",
      "exclusion": "非該当・除外になり得るケース",
      "relatedItems": ["関連する他の項番（任意）"]
    }
  ],
  "catchAll": "外為令16条（キャッチオール規制）の該当可能性と注意点",
  "nextSteps": ["推奨される次のアクション（箇条書き）"]
}`;

  const user = `以下の品目について輸出貿易管理令の該当項番を調査してください。

【品名】${name}
【用途・仕様】${usage || "（未記入）"}
【対象区分】${typeLabel}

候補となる項番を全て列挙し、リスクレベルも評価してください。`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system,
        messages: [{ role:"user", content: user }],
      }),
    });
    const data = await res.json();
    const text = (data.content || []).filter(b=>b.type==="text").map(b=>b.text).join("");
    const parsed = JSON.parse(text.replace(/```json|```/g,"").trim());
    renderResult(parsed);
  } catch(e) {
    showError("通信エラーが発生しました。ネットワーク接続をご確認の上、再度お試しください。");
  } finally {
    btn.disabled = false;
    btn.innerHTML = "🔍 項番を調査する";
  }
}

function showError(msg) {
  const el = document.getElementById("error-msg");
  el.textContent = msg;
  el.style.display = "block";
}

// ── Render ──
function renderResult(r) {
  // Summary
  const risk = RISK[r.overallRisk] || RISK.unknown;
  const sc = document.getElementById("summary-card");
  sc.style.borderLeftColor = risk.color;
  const bo = document.getElementById("badge-overall");
  bo.textContent = "総合リスク：" + risk.label;
  bo.style.cssText += `background:${risk.bg};color:${risk.color};border-color:${risk.border};`;
  document.getElementById("summary-text").textContent = r.summary || "";

  // Candidates
  const cl = document.getElementById("cand-label");
  cl.textContent = `CANDIDATES (${(r.candidates||[]).length})`;
  const list = document.getElementById("candidates-list");
  list.innerHTML = "";
  (r.candidates || []).forEach((item, idx) => {
    const cat = CAT[item.categoryNumber] || { label:"その他", color:"#7f8c8d", icon:"📦" };
    const rr  = RISK[item.riskLevel] || RISK.unknown;
    const div = document.createElement("div");
    div.className = "candidate";
    div.style.borderLeft = `4px solid ${cat.color}`;
    div.style.borderColor = cat.color + "40";
    div.innerHTML = `
      <div class="candidate-header" onclick="toggleCard(this)">
        <span class="cat-icon">${cat.icon}</span>
        <div class="candidate-meta">
          <div>
            <span class="item-number" style="background:${cat.color}18;color:${cat.color}">${item.itemNumber||""}</span>
            <span class="risk-badge" style="background:${rr.bg};color:${rr.color};border-color:${rr.border}">${rr.label}</span>
          </div>
          <div class="item-name">${item.itemName||""}</div>
          <div class="cat-name">${cat.label}カテゴリ</div>
        </div>
        <span class="chevron">▶</span>
      </div>
      <div class="candidate-detail">
        ${detailSection("該当理由", item.reason)}
        ${detailSection("主な規制内容", item.regulation)}
        ${detailSection("許可申請の要否", item.licenseNote)}
        ${detailSection("除外・非該当の可能性", item.exclusion)}
        ${item.relatedItems?.length ? `
          <div class="detail-section">
            <div class="detail-label">関連項番</div>
            <div class="related-tags">${item.relatedItems.map(t=>`<span class="related-tag">${t}</span>`).join("")}</div>
          </div>` : ""}
      </div>`;
    list.appendChild(div);
  });

  // Catch-all
  const cc = document.getElementById("catchall-card");
  if (r.catchAll) {
    document.getElementById("catchall-body").textContent = r.catchAll;
    cc.style.display = "block";
  } else { cc.style.display = "none"; }

  // Next steps
  const nc = document.getElementById("nextsteps-card");
  const nl = document.getElementById("nextsteps-list");
  if (r.nextSteps?.length) {
    nl.innerHTML = r.nextSteps.map(s=>`<li>${s}</li>`).join("");
    nc.style.display = "block";
  } else { nc.style.display = "none"; }

  document.getElementById("results").style.display = "block";
  document.getElementById("results").scrollIntoView({ behavior:"smooth", block:"start" });
}

function detailSection(label, content) {
  if (!content) return "";
  return `<div class="detail-section">
    <div class="detail-label">${label}</div>
    <div class="detail-body">${content}</div>
  </div>`;
}

function toggleCard(header) {
  const detail  = header.nextElementSibling;
  const chevron = header.querySelector(".chevron");
  const open = detail.classList.toggle("open");
  chevron.classList.toggle("open", open);
}

// ── PWA Install ──
let deferredPrompt = null;
window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("install-banner").style.display = "block";
});

async function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  dismissBanner();
}
function dismissBanner() {
  document.getElementById("install-banner").style.display = "none";
}

// ── Service Worker ──
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
</script>
